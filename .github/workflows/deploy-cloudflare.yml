name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Cloudflare credentials
        id: cf
        run: |
          token="${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.CLOUDFLARE_TOKEN || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN }}"
          account="${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT || secrets.ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID }}"

          echo "token_source_check:"
          echo "  CLOUDFLARE_API_TOKEN (secret): ${{ secrets.CLOUDFLARE_API_TOKEN != '' && 'present' || 'missing' }}"
          echo "  CF_API_TOKEN (secret): ${{ secrets.CF_API_TOKEN != '' && 'present' || 'missing' }}"
          echo "  CLOUDFLARE_API_TOKEN (var): ${{ vars.CLOUDFLARE_API_TOKEN != '' && 'present' || 'missing' }}"
          echo "account_source_check:"
          echo "  CLOUDFLARE_ACCOUNT_ID (secret): ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && 'present' || 'missing' }}"
          echo "  CF_ACCOUNT_ID (secret): ${{ secrets.CF_ACCOUNT_ID != '' && 'present' || 'missing' }}"
          echo "  CLOUDFLARE_ACCOUNT_ID (var): ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' && 'present' || 'missing' }}"

          if [ -z "$token" ]; then
            echo "::error::API token not found. Add repository secret CLOUDFLARE_API_TOKEN under Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi
          if [ -z "$account" ]; then
            echo "::error::Account ID not found. Add repository secret CLOUDFLARE_ACCOUNT_ID under Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi

          echo "token_resolved=true" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$token"
          echo "CLOUDFLARE_API_TOKEN=$token" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$account" >> "$GITHUB_ENV"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=mari-hair --branch=main