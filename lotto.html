<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 6/45 자동생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', system-ui, sans-serif;
        }
        
        .lotto-ball {
            width: 78px;
            height: 78px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: white;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3),
                        inset 0 -4px 6px -1px rgb(255 255 255 / 0.3);
            animation: pop 0.6s ease forwards;
        }
        
        @keyframes pop {
            0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1) rotate(0); }
        }
        
        .number-history {
            scrollbar-width: thin;
        }

        body.modal-embed {
            min-height: auto;
        }

        body.modal-embed .lotto-ball {
            width: 56px;
            height: 56px;
            font-size: 22px;
        }

        body.modal-embed .page-wrap {
            padding-top: 1.5rem;
            padding-bottom: 1.5rem;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 to-black text-white min-h-screen">

    <div class="page-wrap max-w-2xl mx-auto px-6 py-12">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-3 bg-yellow-500 text-black font-bold text-2xl px-8 py-3 rounded-3xl mb-6 shadow-lg">
                <i class="fa-solid fa-ticket"></i>
                로또 6/45
            </div>
            <h1 class="text-5xl font-black tracking-tighter mb-2">자동 번호 생성기</h1>
            <p class="text-zinc-400 text-lg">행운의 번호를 뽑아드립니다</p>
        </div>

        <!-- Main Display -->
        <div class="bg-zinc-900/70 border border-yellow-500/30 rounded-3xl p-10 mb-10">
            <div id="result" class="flex flex-wrap justify-center gap-6 min-h-[120px] items-center">
                <!-- 번호가 여기에 생성됨 -->
            </div>
            
            <div class="text-center mt-8">
                <button onclick="generateLotto()" 
                        id="generateBtn"
                        class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-300 hover:to-amber-400 text-black font-bold text-2xl py-6 rounded-2xl transition-all active:scale-95 shadow-xl flex items-center justify-center gap-4">
                    <i class="fa-solid fa-dice fa-spin" id="diceIcon"></i>
                    <span>번호 생성하기</span>
                </button>
            </div>
        </div>

        <!-- Bonus Number -->
        <div id="bonusContainer" class="hidden text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-zinc-800 rounded-2xl px-8 py-4">
                <span class="text-amber-400 font-medium">보너스 번호</span>
                <div id="bonusBall" 
                     class="lotto-ball bg-gradient-to-br from-blue-500 to-indigo-600 text-3xl"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex gap-4 justify-center mb-12">
            <button onclick="copyNumbers()" 
                    class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-5 rounded-2xl flex items-center justify-center gap-3 transition-colors">
                <i class="fa-solid fa-copy"></i>
                <span>번호 복사하기</span>
            </button>
            
            <button onclick="clearHistory()" 
                    class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-5 rounded-2xl flex items-center justify-center gap-3 transition-colors">
                <i class="fa-solid fa-trash"></i>
                <span>기록 지우기</span>
            </button>
        </div>

        <!-- History -->
        <div class="bg-zinc-900/50 rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-clock"></i>
                    생성 기록
                </h2>
                <span id="historyCount" class="text-xs bg-zinc-800 px-4 py-2 rounded-full">0회</span>
            </div>
            
            <div id="history" class="number-history max-h-80 overflow-y-auto space-y-4 pr-4">
                <!-- 기록이 여기에 추가됨 -->
            </div>
        </div>

        <!-- Info -->
        <div class="text-center mt-12 text-zinc-500 text-sm">
            <p>1~45 중 6개의 중복되지 않은 숫자를 무작위로 생성합니다</p>
            <p class="mt-1">행운을 빕니다! 🍀</p>
        </div>
    </div>

    <script>
        let history = [];
        
        function getRandomNumbers() {
            const numbers = new Set();
            while (numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }
            return Array.from(numbers).sort((a, b) => a - b);
        }
        
        function getColorClass(num) {
            if (num <= 10) return 'bg-gradient-to-br from-yellow-400 to-amber-500';
            if (num <= 20) return 'bg-gradient-to-br from-blue-500 to-cyan-500';
            if (num <= 30) return 'bg-gradient-to-br from-red-500 to-rose-500';
            if (num <= 40) return 'bg-gradient-to-br from-green-500 to-emerald-500';
            return 'bg-gradient-to-br from-purple-500 to-violet-500';
        }
        
        function generateLotto() {
            const btn = document.getElementById('generateBtn');
            const dice = document.getElementById('diceIcon');
            
            btn.disabled = true;
            dice.classList.add('fa-spin');
            
            // 애니메이션 효과
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="text-4xl text-zinc-600 font-light animate-pulse">번호 추첨중...</div>
            `;
            
            setTimeout(() => {
                const numbers = getRandomNumbers();
                const bonus = Math.floor(Math.random() * 45) + 1;
                
                let html = '';
                numbers.forEach((num, index) => {
                    html += `
                        <div class="lotto-ball ${getColorClass(num)}">
                            ${num}
                        </div>
                    `;
                });
                
                resultDiv.innerHTML = html;
                
                // 보너스 번호
                document.getElementById('bonusBall').textContent = bonus;
                document.getElementById('bonusContainer').classList.remove('hidden');
                
                // 기록 저장
                const date = new Date();
                const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                
                history.unshift({
                    numbers: numbers,
                    bonus: bonus,
                    time: timeStr
                });
                
                if (history.length > 10) history.pop();
                
                renderHistory();
                
                // 버튼 복구
                btn.disabled = false;
                dice.classList.remove('fa-spin');
                
            }, 1200);
        }
        
        function renderHistory() {
            const historyDiv = document.getElementById('history');
            let html = '';
            
            history.forEach((item, index) => {
                let numHTML = '';
                item.numbers.forEach(num => {
                    numHTML += `<span class="inline-block w-8 h-8 text-sm rounded-full ${getColorClass(num)} flex items-center justify-center mx-0.5">${num}</span>`;
                });
                
                html += `
                    <div class="bg-zinc-800/70 rounded-2xl p-5 flex items-center justify-between group">
                        <div>
                            <div class="text-xs text-zinc-500 mb-2">${item.time}</div>
                            <div class="flex items-center">${numHTML}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-amber-400">보너스</div>
                            <div class="text-2xl font-bold text-amber-400">${item.bonus}</div>
                        </div>
                    </div>
                `;
            });
            
            historyDiv.innerHTML = html || `
                <div class="text-center py-12 text-zinc-600">
                    아직 생성된 번호가 없습니다.<br>
                    버튼을 눌러 행운의 번호를 뽑아보세요!
                </div>
            `;
            
            document.getElementById('historyCount').textContent = `${history.length}회`;
        }
        
        function copyNumbers() {
            if (history.length === 0) {
                alert('먼저 번호를 생성해주세요!');
                return;
            }
            
            const latest = history[0];
            const text = `로또 6/45\n${latest.numbers.join(', ')}\n보너스: ${latest.bonus}\n${latest.time}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const originalText = event.target.innerHTML;
                event.target.innerHTML = `<i class="fa-solid fa-check"></i> 복사 완료!`;
                setTimeout(() => {
                    event.target.innerHTML = originalText;
                }, 2000);
            });
        }
        
        function clearHistory() {
            if (confirm('모든 생성 기록을 지우시겠습니까?')) {
                history = [];
                renderHistory();
                document.getElementById('result').innerHTML = '';
                document.getElementById('bonusContainer').classList.add('hidden');
            }
        }
        
        window.onload = function() {
            if (window.self !== window.top) {
                document.body.classList.add('modal-embed');
            }

            renderHistory();

            setTimeout(() => {
                generateLotto();
            }, 800);
        };
    </script>
</body>
</html>
