<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러그 | Mari Hair Games</title>
    <link rel="stylesheet" href="galaga.css">
</head>
<body>
    <header class="game-header">
        <h1>GALAGA</h1>
        <a href="../index.html#games" class="back-link">← 메인으로</a>
    </header>

    <div class="hud">
        <span>SCORE <span id="score">000000</span></span>
        <span>HI <span id="high-score">000000</span></span>
        <span id="lives">♥♥♥</span>
    </div>

    <div class="game-wrap">
        <canvas id="galaga-canvas" width="480" height="640"></canvas>
    </div>

    <p class="controls-info">
        <kbd>←</kbd> <kbd>→</kbd> 또는 <kbd>A</kbd> <kbd>D</kbd> 이동 &nbsp;|&nbsp;
        <kbd>Space</kbd> 발사 &nbsp;|&nbsp;
        적을 모두 격추하면 다음 웨이브
    </p>

    <script src="galaga.js"></script>
</body>
</html>
